<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Dashbored</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .header {
      max-width: 600px;
      margin: 0 auto 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.2s, color 0.2s;
    }
    .back-btn:hover { border-color: #555; color: #ccc; }
    h1 { font-size: 22px; font-weight: 700; color: #fff; }
    .subtitle {
      font-size: 12px;
      color: #555;
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }
    .list { max-width: 600px; margin: 0 auto; }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #444; }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; flex-shrink: 0; color: #0f0f0f;
    }
    .info { flex: 1; min-width: 0; }
    .name { font-size: 15px; font-weight: 600; color: #ccc; margin-bottom: 4px; }
    .meta { font-size: 12px; color: #555; font-family: 'Courier New', monospace; }
    .reason { font-size: 13px; color: #666; margin-top: 4px; }
    .empty { text-align: center; color: #444; font-size: 14px; margin-top: 60px; }
    #loading { text-align: center; color: #555; font-size: 14px; margin-top: 60px; }

    /* Setup form */
    .setup-form {
      max-width: 600px; margin: 0 auto;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 24px;
    }
    .setup-form h2 { font-size: 15px; color: #888; margin-bottom: 16px; }
    .setup-form label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 1px; }
    .setup-form input {
      width: 100%; background: #111; border: 1px solid #333; border-radius: 8px;
      color: #fff; padding: 10px 12px; font-size: 13px; margin-bottom: 14px;
      font-family: 'Courier New', monospace;
    }
    .setup-form button {
      background: #ff0088; border: none; color: #fff; padding: 10px 20px;
      border-radius: 8px; font-size: 14px; cursor: pointer; width: 100%;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; z-index: 1000;
    }
    .modal {
      background: #1a1a1a; border: 1px solid #333; border-radius: 20px;
      padding: 28px; width: 100%; max-width: 420px; max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
    }
    .modal-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #0f0f0f; flex-shrink: 0;
    }
    .modal-name { color: #fff; font-size: 18px; font-weight: 700; }
    .modal-stage { font-size: 13px; color: #888; margin-top: 4px; }
    .field-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #222;
    }
    .field-row:last-of-type { border-bottom: none; }
    .field-label { color: #555; font-size: 12px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 1px; }
    .field-value { color: #ccc; font-size: 14px; text-align: right; max-width: 60%; }
    .activity-title { color: #555; font-size: 11px; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 10px; }
    .log-entry { display: flex; gap: 10px; margin-bottom: 10px; }
    .log-date { color: #444; font-size: 11px; font-family: 'Courier New', monospace; white-space: nowrap; padding-top: 2px; min-width: 36px; }
    .log-text { color: #999; font-size: 13px; line-height: 1.5; }
    .btn-row { display: flex; gap: 8px; margin-top: 20px; }
    .btn {
      flex: 1; background: none; border-radius: 10px;
      padding: 11px; font-size: 14px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-edit { border: 1px solid #333; color: #888; }
    .btn-edit:hover { border-color: #555; color: #ccc; }
    .btn-unarchive { border: 1px solid #1a3322; color: #446655; }
    .btn-unarchive:hover { border-color: #00ff88; color: #00ff88; }
    .btn-delete { border: 1px solid #331111; color: #664444; }
    .btn-delete:hover { border-color: #ff4444; color: #ff4444; }
    .edit-input {
      width: 100%; background: #111; border: 1px solid #333; border-radius: 8px;
      color: #fff; padding: 9px 12px; font-size: 13px; margin-bottom: 10px;
      font-family: inherit;
    }
    .edit-input:focus { outline: none; border-color: #555; }
    .edit-label { display: block; font-size: 11px; color: #555; font-family: 'Courier New', monospace; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .btn-save { border: 1px solid #ff0088; color: #ff0088; }
    .btn-save:hover { background: #ff008822; }
    .btn-cancel { border: 1px solid #333; color: #888; }
    .btn-cancel:hover { border-color: #555; color: #ccc; }
  </style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="/">← Back</a>
  <div>
    <h1>Archive</h1>
    <div class="subtitle">Past prospects</div>
  </div>
</div>

<div class="list" id="list">
  <div id="loading">Loading…</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()" id="modal-content"></div>
</div>

<script>
const COLORS = ['#ff0088','#ff6600','#ffaa00','#00ff88','#00ffff','#aa88ff','#ff88cc'];
function avatarColor(name) { return COLORS[(name || '?').charCodeAt(0) % COLORS.length]; }
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getDate()}/${d.getMonth() + 1}/${String(d.getFullYear()).slice(-2)}`;
}

let cfg = {};
let allProspects = [];
let currentProspect = null;

function closeModal(e) {
  document.getElementById('modal').style.display = 'none';
  currentProspect = null;
}

function openModal(p) {
  currentProspect = p;
  renderModal(p, false);
  document.getElementById('modal').style.display = 'flex';
}

function renderModal(p, editMode) {
  const color = avatarColor(p.name);
  const initials = (p.name || '?')[0].toUpperCase();

  const fields = [
    { label: 'Stage', value: p.stage },
    { label: 'Platform', value: p.platform },
    { label: 'Rating', value: p.rating ? `${'★'.repeat(Math.floor(p.rating))}${p.rating % 1 ? '½' : ''} (${p.rating})` : null },
    { label: 'Archive reason', value: p.archive_reason },
    { label: 'Notes', value: p.notes },
    { label: 'Archived', value: formatDate(p.updated_at) },
  ].filter(f => f.value);

  const logs = (p.logs || []).slice().reverse();

  if (editMode) {
    document.getElementById('modal-content').innerHTML = `
      <div class="modal-header">
        <div class="modal-avatar" style="background:${color}">${initials}</div>
        <div>
          <div class="modal-name">${p.name}</div>
          <div class="modal-stage">Editing</div>
        </div>
      </div>
      <label class="edit-label">Stage</label>
      <select id="e-stage" class="edit-input">
        ${['texting','first_date','seeing','back_burner'].map(s => `<option value="${s}" ${p.stage===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <label class="edit-label">Platform</label>
      <input id="e-platform" class="edit-input" value="${p.platform || ''}">
      <label class="edit-label">Rating (0.5–5)</label>
      <input id="e-rating" class="edit-input" type="number" min="0.5" max="5" step="0.5" value="${p.rating || ''}">
      <label class="edit-label">Archive Reason</label>
      <input id="e-reason" class="edit-input" value="${p.archive_reason || ''}">
      <label class="edit-label">Notes</label>
      <textarea id="e-notes" class="edit-input" rows="3" style="resize:vertical">${p.notes || ''}</textarea>
      <div class="btn-row">
        <button class="btn btn-cancel" onclick="renderModal(currentProspect, false)">Cancel</button>
        <button class="btn btn-save" onclick="saveEdit()">Save</button>
      </div>`;
    return;
  }

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <div class="modal-avatar" style="background:${color}">${initials}</div>
      <div>
        <div class="modal-name">${p.name}</div>
        <div class="modal-stage">${p.stage || ''}${p.platform ? ' · ' + p.platform : ''}</div>
      </div>
    </div>
    ${fields.map(f => `
      <div class="field-row">
        <span class="field-label">${f.label}</span>
        <span class="field-value">${f.value}</span>
      </div>`).join('')}
    ${logs.length ? `
      <div class="activity-title">Activity</div>
      ${logs.map(log => {
        const d = new Date(log.date);
        return `<div class="log-entry">
          <div class="log-date">${d.getDate()}/${d.getMonth()+1}</div>
          <div class="log-text">${log.text}</div>
        </div>`;
      }).join('')}` : ''}
    <div class="btn-row">
      <button class="btn btn-edit" onclick="renderModal(currentProspect, true)">Edit</button>
      <button class="btn btn-unarchive" onclick="unarchive(currentProspect.id)">Unarchive</button>
      <button class="btn btn-delete" onclick="deletePermanently(currentProspect.id, currentProspect.name)">Delete</button>
    </div>`;
}

async function saveEdit() {
  const update = {
    stage:           document.getElementById('e-stage').value,
    platform:        document.getElementById('e-platform').value || null,
    rating:          parseFloat(document.getElementById('e-rating').value) || null,
    archive_reason:  document.getElementById('e-reason').value || null,
    notes:           document.getElementById('e-notes').value || null,
    updated_at:      new Date().toISOString(),
  };
  try {
    const resp = await fetch(
      `${cfg.dbUrl}/rest/v1/prospects?id=eq.${currentProspect.id}`,
      {
        method: 'PATCH',
        headers: { apikey: cfg.dbKey, Authorization: `Bearer ${cfg.dbKey}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
        body: JSON.stringify(update),
      }
    );
    if (!resp.ok) throw new Error(resp.status);
    const [updated] = await resp.json();
    currentProspect = { ...currentProspect, ...updated };
    allProspects = allProspects.map(p => p.id === currentProspect.id ? currentProspect : p);
    renderModal(currentProspect, false);
    renderList();
  } catch (err) {
    alert('Save failed: ' + err.message);
  }
}

async function unarchive(id) {
  if (!confirm('Move back to active pipeline?')) return;
  try {
    const resp = await fetch(
      `${cfg.dbUrl}/rest/v1/prospects?id=eq.${id}`,
      {
        method: 'PATCH',
        headers: { apikey: cfg.dbKey, Authorization: `Bearer ${cfg.dbKey}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ archived: false, updated_at: new Date().toISOString() }),
      }
    );
    if (!resp.ok) throw new Error(resp.status);
    allProspects = allProspects.filter(p => p.id !== id);
    closeModal();
    renderList();
  } catch (err) {
    alert('Failed: ' + err.message);
  }
}

async function deletePermanently(id, name) {
  if (!confirm(`Permanently delete ${name}? This cannot be undone.`)) return;
  try {
    const resp = await fetch(
      `${cfg.dbUrl}/rest/v1/prospects?id=eq.${id}`,
      {
        method: 'DELETE',
        headers: { apikey: cfg.dbKey, Authorization: `Bearer ${cfg.dbKey}` },
      }
    );
    if (!resp.ok) throw new Error(resp.status);
    allProspects = allProspects.filter(p => p.id !== id);
    closeModal();
    renderList();
  } catch (err) {
    alert('Delete failed: ' + err.message);
  }
}

function renderList() {
  const list = document.getElementById('list');
  if (!allProspects.length) {
    list.innerHTML = '<div class="empty">No archived prospects yet.</div>';
    return;
  }
  list.innerHTML = allProspects.map((p, i) => {
    const initials = (p.name || '?')[0].toUpperCase();
    const color = avatarColor(p.name);
    return `
      <div class="card" onclick="openModal(allProspects[${i}])">
        <div class="avatar" style="background:${color}">${initials}</div>
        <div class="info">
          <div class="name">${p.name}</div>
          ${p.archive_reason ? `<div class="reason">${p.archive_reason}</div>` : ''}
          <div class="meta">${p.stage || ''} · archived ${formatDate(p.updated_at)}</div>
        </div>
      </div>`;
  }).join('');
}

function saveCreds() {
  const existing = (() => { try { return JSON.parse(localStorage.getItem('logit_config')) || {}; } catch { return {}; } })();
  const merged = {
    ...existing,
    dbUrl: document.getElementById('s-url').value.trim(),
    dbKey: document.getElementById('s-key').value.trim(),
    userId: document.getElementById('s-uid').value.trim(),
  };
  localStorage.setItem('logit_config', JSON.stringify(merged));
  load();
}

async function load() {
  cfg = (() => { try { return JSON.parse(localStorage.getItem('logit_config')) || {}; } catch { return {}; } })();
  const list = document.getElementById('list');

  if (!cfg.dbUrl || !cfg.dbKey || !cfg.userId) {
    list.innerHTML = `<div class="setup-form">
      <h2>Enter credentials</h2>
      <label>Supabase URL</label>
      <input id="s-url" placeholder="https://xxx.supabase.co" value="${cfg.dbUrl || ''}">
      <label>Supabase Key</label>
      <input id="s-key" placeholder="eyJ..." value="${cfg.dbKey || ''}">
      <label>User ID</label>
      <input id="s-uid" placeholder="268934826" value="${cfg.userId || ''}">
      <button onclick="saveCreds()">Save &amp; Load</button>
    </div>`;
    return;
  }

  try {
    const resp = await fetch(
      `${cfg.dbUrl}/rest/v1/prospects?user_id=eq.${encodeURIComponent(cfg.userId)}&archived=eq.true&order=updated_at.desc`,
      { headers: { apikey: cfg.dbKey, Authorization: `Bearer ${cfg.dbKey}` } }
    );
    if (!resp.ok) throw new Error(`${resp.status}`);
    allProspects = await resp.json();
    renderList();
  } catch (err) {
    list.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
  }
}

load();
</script>
</body>
</html>
